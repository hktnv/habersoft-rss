name: main-service

x-main-service-image: &main-service-image
  image: main-service-app:0.1.0-ms-015
  build:
    context: .
    dockerfile: Dockerfile

services:
  postgres:
    image: postgres:17.9-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - main-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:8.8.0-trixie
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  tenant-auth-jwks-fixture:
    <<: *main-service-image
    command: ["npm", "run", "start:jwks-fixture"]
    environment:
      LOCAL_JWKS_FIXTURE_PORT: 3080
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3080/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  migrate:
    <<: *main-service-image
    command: ["npm", "run", "migrate:deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy

  main-service-api:
    <<: *main-service-image
    command: ["npm", "run", "start:api"]
    environment:
      RUNTIME_ROLE: api
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_BIND_HOST: ${API_BIND_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TENANT_AUTH_JWKS_URL: http://tenant-auth-jwks-fixture:3080/.well-known/jwks.json
      TENANT_RATE_LIMIT_MAX_REQUESTS: ${TENANT_RATE_LIMIT_MAX_REQUESTS:-60}
      TENANT_RATE_LIMIT_WINDOW_SECONDS: ${TENANT_RATE_LIMIT_WINDOW_SECONDS:-60}
      TENANT_RATE_LIMIT_REDIS_PREFIX: ${TENANT_RATE_LIMIT_REDIS_PREFIX:-tenant_rate_limit:local}
      TENANT_RATE_LIMIT_KEY_SECRET: ${TENANT_RATE_LIMIT_KEY_SECRET:-replace_with_local_only_rate_limit_key_secret_32}
      AGENT_KEY: ${AGENT_KEY:-replace_with_local_only_agent_key_at_least_32_bytes}
      CHECKED_AT_MAX_FUTURE_SKEW_SECONDS: ${CHECKED_AT_MAX_FUTURE_SKEW_SECONDS:-60}
      CHECKED_AT_MAX_AGE_SECONDS: ${CHECKED_AT_MAX_AGE_SECONDS:-900}
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tenant-auth-jwks-fixture:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + process.env.API_PORT + '/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  main-service-worker:
    <<: *main-service-image
    command: ["npm", "run", "start:worker"]
    environment:
      RUNTIME_ROLE: worker
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_BIND_HOST: ${API_BIND_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENTRY_RETENTION_DAYS: ${ENTRY_RETENTION_DAYS:-30}
      ENTRY_MAX_PER_FEED: ${ENTRY_MAX_PER_FEED:-10000}
      ENTRY_DETAIL_RETENTION_DAYS: ${ENTRY_DETAIL_RETENTION_DAYS:-7}
      ENTRY_DETAIL_MAX_PER_FEED: ${ENTRY_DETAIL_MAX_PER_FEED:-2000}
      BULLMQ_PREFIX: ${BULLMQ_PREFIX:-main-service-local}
      MAINTENANCE_COMPLETED_JOB_RETENTION_SECONDS: ${MAINTENANCE_COMPLETED_JOB_RETENTION_SECONDS:-604800}
      MAINTENANCE_COMPLETED_JOB_MAX_COUNT: ${MAINTENANCE_COMPLETED_JOB_MAX_COUNT:-1000}
      MAINTENANCE_FAILED_JOB_RETENTION_SECONDS: ${MAINTENANCE_FAILED_JOB_RETENTION_SECONDS:-2592000}
      MAINTENANCE_FAILED_JOB_MAX_COUNT: ${MAINTENANCE_FAILED_JOB_MAX_COUNT:-5000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "npm", "run", "worker:health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  main-service-postgres-data:
