name: main-service

x-main-service-image: &main-service-image
  image: main-service-app:0.1.0-ms-003
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env

services:
  postgres:
    image: postgres:17.9-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - main-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:8.8.0-trixie
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  tenant-auth-jwks-fixture:
    <<: *main-service-image
    command: ["npm", "run", "start:jwks-fixture"]
    environment:
      RUNTIME_ROLE: api
      LOCAL_JWKS_FIXTURE_PORT: 3080
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3080/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  migrate:
    <<: *main-service-image
    command: ["npm", "run", "migrate:deploy"]
    depends_on:
      postgres:
        condition: service_healthy

  main-service-api:
    <<: *main-service-image
    command: ["npm", "run", "start:api"]
    environment:
      RUNTIME_ROLE: api
      TENANT_AUTH_JWKS_URL: http://tenant-auth-jwks-fixture:3080/.well-known/jwks.json
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tenant-auth-jwks-fixture:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + process.env.API_PORT + '/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  main-service-worker:
    <<: *main-service-image
    command: ["npm", "run", "start:worker"]
    environment:
      RUNTIME_ROLE: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  main-service-postgres-data:
