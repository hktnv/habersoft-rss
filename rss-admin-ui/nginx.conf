server {
  listen 8080;
  server_name _;
  merge_slashes off;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

__ADMIN_UI_AUTH_ROUTES__

  location = /status-api/health/live {
    if ($request_method != GET) {
      return 405;
    }

    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    set $args "";
    proxy_method GET;
    proxy_pass_request_headers off;
    proxy_pass_request_body off;
    proxy_set_header Host $proxy_host;
    proxy_set_header Accept "application/json";
    proxy_set_header Content-Length "";
    proxy_hide_header Set-Cookie;
    proxy_hide_header WWW-Authenticate;
    proxy_connect_timeout 2s;
    proxy_send_timeout 2s;
    proxy_read_timeout 4s;
    proxy_buffering off;
    proxy_pass __ADMIN_UI_HEALTH_UPSTREAM_ORIGIN__/health/live?;
  }

  location = /status-api/health/ready {
    if ($request_method != GET) {
      return 405;
    }

    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    set $args "";
    proxy_method GET;
    proxy_pass_request_headers off;
    proxy_pass_request_body off;
    proxy_set_header Host $proxy_host;
    proxy_set_header Accept "application/json";
    proxy_set_header Content-Length "";
    proxy_hide_header Set-Cookie;
    proxy_hide_header WWW-Authenticate;
    proxy_connect_timeout 2s;
    proxy_send_timeout 2s;
    proxy_read_timeout 4s;
    proxy_buffering off;
    proxy_pass __ADMIN_UI_HEALTH_UPSTREAM_ORIGIN__/health/ready?;
  }

  location ^~ /status-api/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    return 404;
  }

  location = /env-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
